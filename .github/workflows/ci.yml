name: CI

on:
  push:
    branches: [main, 'feature/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend — Test (GraalVM JDK 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: gradle
      - run: chmod +x gradlew
      - run: ./gradlew test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-report
          path: apps/backend/build/reports/tests/

  backend-native-build:
    name: Backend — GraalVM native compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          native-image-job-reports: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: gradle
      - run: chmod +x gradlew
      - run: ./gradlew nativeCompile
      - run: ./gradlew packageNative
      - uses: actions/upload-artifact@v4
        with:
          name: function-zip
          path: apps/backend/build/function.zip

  mobile-type-check:
    name: Mobile — TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: cd apps/mobile && npx tsc --noEmit

  infra-synth:
    name: Infra — CDK synth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: cd infra && npx tsc --noEmit
