name: CI

on:
  push:
    branches: [main, 'feature/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  # ── Java Backend ──────────────────────────────────────────────
  backend-build-test:
    name: Backend — Build & Test (Java 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build
        run: ./gradlew build -x test
      - name: Test
        run: ./gradlew test
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: apps/backend/build/reports/tests/

  # ── Mobile type-check ─────────────────────────────────────────
  mobile-type-check:
    name: Mobile — Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
        working-directory: .
      - run: npx tsc --noEmit

  # ── Infra type-check ──────────────────────────────────────────
  infra-synth:
    name: Infra — CDK Synth
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
        working-directory: .
      - run: npx tsc --noEmit
      - run: npx cdk synth --app "npx ts-node lib/app.ts" 2>/dev/null || true
        env:
          CDK_DEFAULT_ACCOUNT: '000000000000'
          CDK_DEFAULT_REGION: eu-west-1
