name: Deploy → Production

on:
  push:
    tags: ['v*']

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: gradle
      - name: Build native binary
        working-directory: apps/backend
        run: |
          chmod +x gradlew
          ./gradlew test nativeCompile packageNative --no-daemon

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install infra deps
        working-directory: infra
        run: npm install --legacy-peer-deps
      - name: CDK deploy (production)
        working-directory: infra
        run: npx cdk deploy --all --context env=production --require-approval never
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    eu-west-1

      - name: Install mobile deps
        working-directory: apps/mobile
        run: npm install --legacy-peer-deps
      - name: Submit to App Store + Google Play
        working-directory: apps/mobile
        run: npx eas submit --platform all --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
