name: Deploy → Staging

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      # ── Build Java GraalVM native binary ──────────────────────
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: gradle
      - name: Build native binary
        working-directory: apps/backend
        run: |
          chmod +x gradlew
          ./gradlew test nativeCompile packageNative --no-daemon

      # ── CDK deploy to staging ─────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install infra deps
        working-directory: infra
        run: npm install --legacy-peer-deps
      - name: CDK deploy (staging)
        working-directory: infra
        run: npx cdk deploy --all --context env=staging --require-approval never
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    eu-west-1

      # ── Expo EAS build ────────────────────────────────────────
      - name: Install mobile deps
        working-directory: apps/mobile
        run: npm install --legacy-peer-deps
      - name: EAS build (staging)
        working-directory: apps/mobile
        run: npx eas build --platform all --profile staging --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
