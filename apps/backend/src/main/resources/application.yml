micronaut:
  application:
    name: rallyhub-backend
  server:
    port: 8080

rallyhub:
  aws:
    region: ${AWS_REGION:eu-west-1}
  cognito:
    user-pool-id: ${COGNITO_USER_POOL_ID}
    client-id:    ${COGNITO_CLIENT_ID}
  sns:
    topic-arn: ${SNS_TOPIC_ARN:}
  dynamodb:
    table:
      users:         ${TABLE_USERS:rallyhub-users}
      clubs:         ${TABLE_CLUBS:rallyhub-clubs}
      memberships:   ${TABLE_MEMBERSHIPS:rallyhub-memberships}
      sessions:      ${TABLE_SESSIONS:rallyhub-sessions}
      schedules:     ${TABLE_SCHEDULES:rallyhub-schedules}
      ledger:        ${TABLE_LEDGER:rallyhub-ledger}
      tournaments:   ${TABLE_TOURNAMENTS:rallyhub-tournaments}
      declarations:  ${TABLE_DECLARATIONS:rallyhub-declarations}
      payments:      ${TABLE_PAYMENTS:rallyhub-payments}
      announcements: ${TABLE_ANNOUNCEMENTS:rallyhub-announcements}
      join-requests: ${TABLE_JOIN_REQUESTS:rallyhub-join-requests}

logger:
  levels:
    app.rallyhub:           INFO
    software.amazon.awssdk: WARN
